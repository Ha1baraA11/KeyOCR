name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 opencv-python numpy pyinstaller
        pip install paddlepaddle paddleocr
        # PaddleOCR 3.x 依赖 PaddleX OCR pipeline，需安装 ocr extra
        pip install "paddlex[ocr]"
        # paddleocr/paddlex 传递依赖（pip 可能不自动装全）
        pip install pandas scipy scikit-image shapely pyclipper rapidfuzz lmdb pyyaml tqdm protobuf Pillow requests

    - name: Build EXE
      run: |
        pyinstaller frame_extractor.spec --noconfirm

    - name: Setup Inno Setup
      uses: Minionguyjpro/inno-setup-action@v1.2.2
      with:
        path: frame_extractor.iss

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 帧提取工具-exe
        path: dist/帧提取工具.exe
        retention-days: 90

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: 帧提取工具-安装程序
        path: Output/帧提取工具_安装程序.exe
        retention-days: 90
