name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip uninstall opencv-python opencv-contrib-python opencv-python-headless -y
        python -m pip install PySide6 numpy pyinstaller rapidocr-onnxruntime
        python -m pip install opencv-contrib-python==4.10.0.84
        python -m pip install paddlepaddle-gpu==3.3.0 -i https://www.paddlepaddle.org.cn/packages/stable/cu118/
        python -m pip install paddleocr "paddlex[ocr]" pypdfium2
        python -c "import paddle; print('paddle:', paddle.__version__, 'CUDA:', paddle.device.is_compiled_with_cuda()); assert paddle.device.is_compiled_with_cuda(), '当前安装的不是 GPU 版 paddle，不能发布 release'"
        python -m pip install pandas scipy scikit-image shapely pyclipper rapidfuzz lmdb pyyaml tqdm protobuf Pillow requests

    - name: Build EXE
      run: |
        pyinstaller packaging/frame_extractor.spec --noconfirm

    - name: Self-check bundled runtime
      continue-on-error: true
      run: |
        $env:KEYOCR_SELF_CHECK = "1"
        $env:KEYOCR_SELF_CHECK_OUTPUT = "$pwd\dist\self-check.json"
        & ".\dist\KeyOCR.exe"
        Write-Host "Exit code: $LASTEXITCODE"
        if (Test-Path "$pwd\dist\self-check.json") {
          Get-Content "$pwd\dist\self-check.json"
        } else {
          Write-Host "self-check.json not found - EXE may have crashed in CI environment"
        }

    - name: Setup Inno Setup
      uses: Minionguyjpro/inno-setup-action@v1.2.2
      with:
        path: packaging/frame_extractor.iss

    - name: Upload Windows artifacts
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          dist/KeyOCR.exe
          Output/KeyOCR_Setup.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install PySide6 opencv-contrib-python==4.10.0.84 numpy rapidocr-onnxruntime pyinstaller

    - name: Build macOS App
      run: |
        pyinstaller --windowed --onedir --icon=assets/icon.ico --name KeyOCR \
          --add-data "assets/icon.ico:." \
          --hidden-import rapidocr_onnxruntime \
          --hidden-import rapidocr \
          frame_extractor_gui.py

    - name: Upload macOS artifacts
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: dist/KeyOCR.app

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push'

    steps:
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: ./windows

    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-build
        path: ./macos

    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        tag="v$(date +%Y%m%d-%H%M%S)"
        cp "windows/KeyOCR.exe" "KeyOCR.exe"
        cp "windows/KeyOCR_Setup.exe" "KeyOCR_Setup.exe"
        cd macos && zip -r ../KeyOCR-macOS.zip KeyOCR.app && cd ..
        gh release create "$tag" \
          --title "KeyOCR $tag" \
          --generate-notes \
          KeyOCR.exe \
          KeyOCR_Setup.exe \
          KeyOCR-macOS.zip
