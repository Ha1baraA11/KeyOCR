name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 opencv-python numpy paddlepaddle paddleocr pyinstaller

    - name: Build EXE
      run: |
        pyinstaller frame_extractor.spec --noconfirm

    - name: Setup Inno Setup
      uses: Minionguyjpro/inno-setup-action@v1.2.2
      with:
        path: frame_extractor.iss

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 帧提取工具-exe
        path: dist/帧提取工具.exe
        retention-days: 90

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: 帧提取工具-安装程序
        path: Output/帧提取工具_安装程序.exe
        retention-days: 90
