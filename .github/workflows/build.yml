name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 清理冲突的 OpenCV 包
        python -m pip uninstall opencv-python opencv-contrib-python opencv-python-headless -y
        # 基础依赖
        python -m pip install PySide6 numpy pyinstaller rapidocr-onnxruntime
        python -m pip install opencv-contrib-python==4.10.0.84
        # 发布给用户的安装包必须内置 GPU 版 paddle；
        # CI 机器本身没显卡没关系，只要 wheel 是 compiled_with_cuda=True 就行。
        # 用 PaddlePaddle 官方镜像（百度源已不可靠）
        python -m pip install paddlepaddle-gpu==3.3.0 -i https://www.paddlepaddle.org.cn/packages/stable/cu118/
        python -m pip install paddleocr "paddlex[ocr]" pypdfium2
        python -c "import paddle; print('paddle:', paddle.__version__, 'CUDA:', paddle.device.is_compiled_with_cuda()); assert paddle.device.is_compiled_with_cuda(), '当前安装的不是 GPU 版 paddle，不能发布 release'"
        # paddleocr/paddlex 传递依赖（pip 可能不自动装全）
        python -m pip install pandas scipy scikit-image shapely pyclipper rapidfuzz lmdb pyyaml tqdm protobuf Pillow requests

    - name: Build EXE
      run: |
        pyinstaller frame_extractor.spec --noconfirm

    - name: Self-check bundled runtime
      run: |
        $env:ZHENTIQU_SELF_CHECK = "1"
        $env:ZHENTIQU_SELF_CHECK_OUTPUT = "$pwd\dist\self-check.json"
        & ".\dist\帧提取工具.exe"
        if ($LASTEXITCODE -ne 0) {
          if (Test-Path "$pwd\dist\self-check.json") {
            Get-Content "$pwd\dist\self-check.json"
          }
          throw "Bundled EXE self-check failed"
        }
        Get-Content "$pwd\dist\self-check.json"

    - name: Setup Inno Setup
      uses: Minionguyjpro/inno-setup-action@v1.2.2
      with:
        path: frame_extractor.iss

    - name: Create Release
      if: github.event_name == 'push'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        tag="v$(date +%Y%m%d-%H%M%S)"
        cp "dist/帧提取工具.exe" "dist/ZhenTiqu.exe"
        cp "Output/帧提取工具_安装程序.exe" "Output/ZhenTiqu_Setup.exe"
        gh release create "$tag" --title "帧提取工具 $tag" --generate-notes dist/ZhenTiqu.exe Output/ZhenTiqu_Setup.exe
