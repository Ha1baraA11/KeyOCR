name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 清理冲突的 OpenCV 包
        python -m pip uninstall opencv-python opencv-contrib-python opencv-python-headless -y
        # 基础依赖
        python -m pip install PySide6 numpy pyinstaller rapidocr-onnxruntime
        python -m pip install opencv-contrib-python==4.10.0.84
        # PaddleOCR GPU 依赖（paddlepaddle-gpu 不在 PyPI，用百度源）
        python -m pip install paddlepaddle-gpu==3.3.0 -i https://mirror.baidu.com/pypi/simple || python -m pip install paddlepaddle -i https://mirror.baidu.com/pypi/simple
        python -m pip install paddleocr "paddlex[ocr]" pypdfium2
        python -c "import paddle; print('paddle:', paddle.__version__, 'CUDA:', paddle.device.is_compiled_with_cuda()); assert paddle.device.is_compiled_with_cuda(), 'paddlepaddle-gpu 未安装成功，GPU OCR 不可用'"
        # paddleocr/paddlex 传递依赖（pip 可能不自动装全）
        python -m pip install pandas scipy scikit-image shapely pyclipper rapidfuzz lmdb pyyaml tqdm protobuf Pillow requests

    - name: Build EXE
      run: |
        pyinstaller frame_extractor.spec --noconfirm

    - name: Setup Inno Setup
      uses: Minionguyjpro/inno-setup-action@v1.2.2
      with:
        path: frame_extractor.iss

    - name: Create Release
      if: github.event_name == 'push'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        tag="v$(date +%Y%m%d-%H%M%S)"
        cp "dist/帧提取工具.exe" "dist/ZhenTiqu.exe"
        cp "Output/帧提取工具_安装程序.exe" "Output/ZhenTiqu_Setup.exe"
        gh release create "$tag" --title "帧提取工具 $tag" --generate-notes dist/ZhenTiqu.exe Output/ZhenTiqu_Setup.exe
