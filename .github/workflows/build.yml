name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 opencv-python numpy paddlepaddle paddleocr pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "帧提取工具" --icon=icon.ico frame_extractor_gui.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 帧提取工具
        path: dist/帧提取工具.exe
        retention-days: 90
